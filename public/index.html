<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Julia's Arsenal for Daggerheart</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Crete+Round&display=swap"
    />
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <header id="mobile-header">
      <h1>Julia's Arsenal for <span>Daggerheart</span></h1>
      <button
        id="menu-toggle"
        type="button"
        aria-expanded="false"
        aria-controls="sidebar"
        aria-label="Open menu"
      >
        <i data-feather="menu"></i>
      </button>
    </header>
    <div id="sidebar-backdrop" hidden></div>
    <div id="container">
      <aside id="sidebar">
        <h2>Julia's Arsenal for <span>Daggerheart</span></h2>
        <ul id="file-list"></ul>
      </aside>
      <main id="content">
        <div id="md-content"></div>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
